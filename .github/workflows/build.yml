name: Colcon Build

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-22.04

    # Uruchamiamy kroki wewnątrz kontenera z ROS 2 Humble
    container:
      image: ros:humble-ros-base  # alternatywnie: ros:humble

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive          # <<< WAŻNE
          # Jeśli submoduły są prywatne i w innych repo:
          # token: ${{ secrets.GH_PAT }}

      - name: Install build tools & rosdep
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential cmake git \
            python3-pip python3-vcstool \
            python3-colcon-common-extensions \
            python3-rosdep
          # inicjalizacja rosdep (w kontenerze zwykle działamy jako root)
          rosdep init || true
          rosdep update

      # (Opcjonalnie) jeżeli używasz .repos do pobierania zależnych pakietów:
      - name: Import additional repos (optional)
        if: hashFiles('*.repos') != ''
        run: |
          vcs import src < $(ls *.repos | head -n 1)

      - name: Install package dependencies via rosdep
        run: |
          source /opt/ros/humble/setup.bash
          rosdep install --from-paths src --ignore-src -r -y --rosdistro humble

      - name: Build with colcon
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --packages-select putm_vcl_interfaces putm_vcl

      # (Opcjonalnie) testy
      - name: Test with colcon (optional)
        if: always()
        run: |
          source /opt/ros/humble/setup.bash
          colcon test --packages-select putm_vcl